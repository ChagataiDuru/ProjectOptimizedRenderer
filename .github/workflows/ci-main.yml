name: CI Main Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      # ── macOS dependencies ────────────────────────────────────────────
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install molten-vk glslang

      # ── Conan install ─────────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: conan install . --output-folder=build --build=missing -s build_type=Debug

      # Windows MSVC: -s compiler.cppstd=20 (default is C++14, spirv-tools needs 17+)
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: conan install . --output-folder=build --build=missing -s build_type=Debug -s compiler.cppstd=20

      # ── Build ─────────────────────────────────────────────────────────
      # macOS: Conan generates "conan-debug" preset (single-config Ninja)
      - name: Configure & Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset conan-debug
          cmake --build --preset conan-debug

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --build --preset win-debug