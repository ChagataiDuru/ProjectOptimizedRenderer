name: CI Main Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      # ── macOS dependencies ────────────────────────────────────────────
      # MoltenVK: required by CheckMoltenVK.cmake
      # glslang (brew): provides glslangValidator CLI for shader compilation
      #   Conan's glslang package only builds the library, not the CLI tools.
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install molten-vk glslang

      # ── Conan install ─────────────────────────────────────────────────
      # -s build_type=Debug: generates "conan-debug" preset (default profile is Release)
      # -s compiler.cppstd=20: Windows MSVC auto-profile defaults to C++14,
      #   but spirv-tools requires C++17 and our project uses C++20
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: conan install . --output-folder=build --build=missing -s build_type=Debug

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: conan install . --output-folder=build --build=missing -s build_type=Debug -s compiler.cppstd=20

      # ── Build ─────────────────────────────────────────────────────────
      - name: Configure & Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset conan-debug
          cmake --build --preset conan-debug

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --preset conan-debug
          cmake --build --preset conan-debug