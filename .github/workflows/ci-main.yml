name: CI Main Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      # ── macOS: install MoltenVK (required by CheckMoltenVK.cmake) ─────
      - name: Install MoltenVK (macOS)
        if: runner.os == 'macOS'
        run: brew install molten-vk

      # ── Conan install: explicitly request Debug build type ────────────
      # Default profile from "conan profile detect" uses Release,
      # which only generates a "conan-release" preset. We need "conan-debug".
      - name: Install dependencies (Conan)
        run: conan install . --output-folder=build --build=missing -s build_type=Debug

      # ── Build ─────────────────────────────────────────────────────────
      - name: Configure & Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset conan-debug
          cmake --build --preset conan-debug

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --preset conan-debug
          cmake --build --preset conan-debug