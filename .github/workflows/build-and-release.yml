name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v2.0.0-pre)"
        required: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS-arm64
          - os: windows-latest
            platform: Windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: python -m pip install --upgrade pip conan

      - name: Detect Conan profile
        run: conan profile detect --force

      # ── macOS dependencies ────────────────────────────────────────────
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install molten-vk glslang

      # ── Conan install ─────────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: conan install . --output-folder=build --build=missing -s build_type=Debug

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: conan install . --output-folder=build --build=missing -s build_type=Debug -s compiler.cppstd=20

      # ── Build ─────────────────────────────────────────────────────────
      - name: Configure & Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset conan-debug
          cmake --build --preset conan-debug

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --preset win-debug
          cmake --build --preset win-debug --config Debug

      # ── Package ───────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging/shaders
          cp build/conan-debug/ProjectOptimizedRenderer staging/
          cp build/conan-debug/shaders/*.spv staging/shaders/ || true
          cd staging && zip -r ../ProjectOptimizedRenderer-${{ matrix.platform }}.zip .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging/shaders
          cp build/Debug/ProjectOptimizedRenderer.exe staging/ || cp build/conan-default/Debug/ProjectOptimizedRenderer.exe staging/
          cp build/shaders/*.spv staging/shaders/ 2>/dev/null || cp build/conan-default/shaders/*.spv staging/shaders/ 2>/dev/null || true
          cd staging && 7z a -tzip ../ProjectOptimizedRenderer-${{ matrix.platform }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectOptimizedRenderer-${{ matrix.platform }}
          path: ProjectOptimizedRenderer-${{ matrix.platform }}.zip

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Determine if pre-release
        id: prerelease
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if echo "$TAG" | grep -qiE '(alpha|beta|rc|pre|debug|dev)'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.tag.outputs.tag }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
