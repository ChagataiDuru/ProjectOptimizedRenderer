name: Build & Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.preset }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-debug
            artifact_name: ProjectOptimizedRenderer-linux
          - os: windows-latest
            preset: win-debug
            artifact_name: ProjectOptimizedRenderer-windows
          - os: macos-latest
            preset: macos-debug
            artifact_name: ProjectOptimizedRenderer-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      # Optional but useful if your presets rely on Python/conan helpers.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Linux dependencies (adjust package list as your project needs)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            mesa-vulkan-drivers \
            vulkan-tools \
            libvulkan-dev

      # Install Vulkan SDK on Windows so find_package(Vulkan 1.4 REQUIRED) succeeds.
      - name: Setup Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk --yes --no-progress
          $vulkanRoot = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { throw "Vulkan SDK install failed: C:\VulkanSDK not found." }

          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Vulkan_ROOT=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Ensure tools/libs are discoverable during configure/build
          "PATH=$($vulkanRoot.FullName)\Bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show tool versions
        shell: bash
        run: |
          cmake --version
          ninja --version
          c++ --version || true
          gcc --version || true
          clang --version || true
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "VULKAN_SDK=${VULKAN_SDK:-<unset>}"
          fi

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail

          EXTRA_ARGS=()
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Helps CMake's FindVulkan locate the SDK on windows-latest + MinGW.
            EXTRA_ARGS+=("-DVulkan_ROOT=${VULKAN_SDK}")
          fi

          cmake --preset "${{ matrix.preset }}" "${EXTRA_ARGS[@]}"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build --preset "${{ matrix.preset }}" --config Debug --parallel

      - name: Locate built executable
        id: locate_bin
        shell: bash
        run: |
          set -euo pipefail

          EXE_NAME="ProjectOptimizedRenderer"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXE_NAME="${EXE_NAME}.exe"
          fi

          # Common output locations for single-config and multi-config generators.
          CANDIDATES=(
            "build/conan-debug/${EXE_NAME}"
            "build/conan-debug/Debug/${EXE_NAME}"
            "build/conan-debug/Release/${EXE_NAME}"
            "build/${EXE_NAME}"
            "build/Debug/${EXE_NAME}"
            "build/Release/${EXE_NAME}"
            "${EXE_NAME}"
          )

          BIN_PATH=""
          for p in "${CANDIDATES[@]}"; do
            if [[ -f "$p" ]]; then
              BIN_PATH="$p"
              break
            fi
          done

          if [[ -z "$BIN_PATH" ]]; then
            BIN_PATH="$(find build -type f -name "${EXE_NAME}" | head -n 1 || true)"
          fi

          if [[ -z "$BIN_PATH" ]]; then
            echo "ERROR: Could not find built executable: ${EXE_NAME}"
            echo "Dumping build tree for diagnostics:"
            find build -maxdepth 8 -type f | sort || true
            exit 1
          fi

          echo "Found executable: $BIN_PATH"
          echo "bin_path=$BIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "${{ steps.locate_bin.outputs.bin_path }}" "dist/ProjectOptimizedRenderer.exe"
          else
            cp "${{ steps.locate_bin.outputs.bin_path }}" "dist/ProjectOptimizedRenderer"
            chmod +x "dist/ProjectOptimizedRenderer" || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error